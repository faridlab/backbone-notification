# Codegen policy for notification.
#
# `user_owned` globs are hand-written files that live inside generator-owned trees but are
# NOT schema-derived. `metaphor schema generate [--force]` skips them wholesale (never reads,
# merges, or deletes them). Everything else in src/ is regenerated from schema/models.
#
# Re-exports/declarations that must sit alongside generated code live inside
# `// <<< CUSTOM ... // END CUSTOM` markers (service/mod.rs, presentation/http/mod.rs, lib.rs)
# and are preserved by the marker mechanism, not listed here.
#
# Add your hand-authored services, handlers, tests, and docs below as you write them.

user_owned:
  - "src/application/service/notification_events.rs"
  - "src/application/service/notification_ports.rs"
  - "src/application/service/notification_write_service.rs"
  # Own the hand-written notification SQL (the template definition + active-template resolve, the
  # per-recipient dedup claim, the sent/failed transitions, the stranded-pending sweep, the delivery
  # receipt) that the write service orchestrates. Declared here — not renamed with a `_custom` suffix —
  # so the generator skips them wholesale; this declaration is what makes editing them legitimate.
  - "src/infrastructure/persistence/notification_repository.rs"
  - "src/infrastructure/persistence/notification_template_repository.rs"
  - "tests/delivery_state_outbox_durability.rs"
  - "tests/integrity_probes.rs"
  - "tests/notification_communication_seam.rs"
  - "tests/notification_golden_cases.rs"
  - "scripts/**"

  # Behavior tests (the golden cases / oracle) + BDD features.
  - "tests/features/**"

  # Hand-authored module documentation.
  - "docs/**"
