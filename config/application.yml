server:
  host: 0.0.0.0
  port: 3000
  grpc_port: 50051
database:
  url: postgresql://root:password@localhost:5432/backbonedb
  max_connections: 20
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
module:
  name: notification
  enabled: true
features:
  soft_delete: true
  state_machines: true
  workflows: true
logging:
  level: info
  format: json
  file: logs/notification.log
tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317
metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
entities:
  notification:
    collection: notifications
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  notification_preference:
    collection: notification_preferences
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
