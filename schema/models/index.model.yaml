# =============================================================================
# Notification Module - Schema Index
# =============================================================================
# Version: 2.0
# Description: Notification delivery and user preferences
#
# Run `backbone schema generate notification --target all` to generate code.
# =============================================================================

module: notification
version: 2
schema: notification
description: "Outbound templated notification fan-out — subscribes to domain events, renders a template, and dispatches through backbone-communication; idempotent per (event_id, recipient)"

# Module-level configuration
config:
  database: postgresql
  soft_delete: true
  audit: true
  default_timestamps: true
  generators:
    disabled:
      - graphql
      - grpc
      - proto
      - openapi

# External imports - reuse sapiens for user identity (same pattern as bersihir)
external_imports:
  - module: sapiens
    types: [User]

# Shared types available to all models in this module
shared_types:
  Timestamps:
    created_at:
      type: datetime
      attributes: ["@default(now)"]
      description: "Record creation timestamp"
    updated_at:
      type: datetime
      attributes: ["@updated_at"]
      description: "Last update timestamp"
    deleted_at:
      type: datetime?
      description: "Soft delete timestamp"

  Actors:
    created_by:
      type: uuid?
      attributes: ["@foreign_key(sapiens.User.id)"]
      description: "User who created this record"
    updated_by:
      type: uuid?
      attributes: ["@foreign_key(sapiens.User.id)"]
      description: "User who last updated this record"
    deleted_by:
      type: uuid?
      attributes: ["@foreign_key(sapiens.User.id)"]
      description: "User who deleted this record"

  Metadata: [Timestamps, Actors]

# Import all model files
imports:
  - notification_template.model.yaml
  - notification.model.yaml
