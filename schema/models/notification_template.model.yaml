# =============================================================================
# Domain: Notification
# Entity: NotificationTemplate
# Description: A reusable message template keyed by (company, event_type, channel). When a domain event
# fires (OrderConfirmed, InvoiceDue, SLABreached), the matching active template renders the body from the
# event's data (a `{{placeholder}}` substitution) and the result is dispatched through backbone-
# communication. One active template per (company, event_type, channel).
# =============================================================================

models:
  - name: NotificationTemplate
    collection: notification_templates
    description: "A message template for a domain event on a channel"
    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique template id"
      company_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Org owner # logical FK to organization.Company.id"
      event_type:
        type: string
        attributes: ["@required", "@length(max=80)"]
        description: "The domain event this template reacts to (OrderConfirmed, InvoiceDue, …)"
      channel:
        type: NotifChannel
        attributes: ["@required", "@default(whatsapp)"]
        description: "The channel the rendered message is dispatched over"
      name:
        type: string
        attributes: ["@required", "@length(max=140)"]
        description: "Human-readable template name"
      subject_template:
        type: string?
        attributes: ["@length(max=200)"]
        description: "Subject template (email); supports {{placeholders}}"
      body_template:
        type: string
        attributes: ["@required", "@length(max=4000)"]
        description: "Body template; supports {{placeholders}} substituted from the event data"
      is_active:
        type: boolean
        attributes: ["@default(true)"]
        description: "Only active templates are matched"
      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata"
    indexes:
      - type: unique
        fields: [company_id, event_type, channel]

enums:
  - name: NotifChannel
    description: "A dispatch channel (mirrors communication's channels)"
    variants:
      - name: whatsapp
        description: "WhatsApp Business API"
        default: true
      - name: email
        description: "Email"
      - name: sms
        description: "SMS"
