# =============================================================================
# Domain: Platform
# Entity: Notification
# Description: User notifications
# =============================================================================

# =============================================================================
# Enums
# =============================================================================

enums:
  # ---------------------------------------------------------------------------
  # Notification Type
  # ---------------------------------------------------------------------------
  - name: NotificationType
    description: "Type of notification"
    variants:
      - name: order
        description: "Order-related notification"
        default: true
      - name: payment
        description: "Payment notification"
      - name: promo
        description: "Promotional notification"
      - name: marketing
        description: "Marketing notification"
      - name: system
        description: "System notification"
      - name: reminder
        description: "Reminder notification"
      - name: alert
        description: "Alert/warning notification"

  # ---------------------------------------------------------------------------
  # Notification Status
  # ---------------------------------------------------------------------------
  - name: NotificationStatus
    description: "Notification delivery status"
    variants:
      - name: pending
        description: "Pending delivery"
        default: true
      - name: scheduled
        description: "Scheduled for later"
      - name: sent
        description: "Sent"
      - name: delivered
        description: "Delivered"
      - name: read
        description: "Read"
      - name: failed
        description: "Delivery failed"
      - name: cancelled
        description: "Cancelled"

  # ---------------------------------------------------------------------------
  # Notification Priority
  # ---------------------------------------------------------------------------
  - name: NotificationPriority
    description: "Notification priority level"
    variants:
      - name: low
        description: "Low priority"
      - name: normal
        description: "Normal priority"
        default: true
      - name: high
        description: "High priority"
      - name: urgent
        description: "Urgent"

  # ---------------------------------------------------------------------------
  # Digest Frequency
  # ---------------------------------------------------------------------------
  - name: DigestFrequency
    description: "How often to send digest"
    variants:
      - name: daily
        description: "Daily digest"
        default: true
      - name: weekly
        description: "Weekly digest"

# =============================================================================
# Models
# =============================================================================

models:
  # ---------------------------------------------------------------------------
  # Notification - User notification record
  # ---------------------------------------------------------------------------
  - name: Notification
    collection: notifications
    description: "User notification (in-app, push, SMS, WhatsApp, email)"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique notification identifier"

      # =======================================================================
      # Recipient
      # =======================================================================
      user_id:
        type: uuid
        attributes: ["@required", "@foreign_key(sapiens.User.id)"]
        description: "Recipient user"

      # =======================================================================
      # Type & Channel
      # =======================================================================
      notification_type:
        type: NotificationType
        attributes: ["@required"]
        description: "Type of notification"

      channel:
        type: NotificationChannel
        attributes: ["@required"]
        description: "Delivery channel"

      # =======================================================================
      # Content
      # =======================================================================
      title:
        type: string
        attributes: ["@required", "@max(255)"]
        description: "Notification title"

      body:
        type: string
        attributes: ["@required", "@max(2000)"]
        description: "Notification body"

      image_url:
        type: string?
        attributes: ["@max(500)"]
        description: "Image URL"

      action_url:
        type: string?
        attributes: ["@max(500)"]
        description: "Deep link or URL"

      action_type:
        type: string?
        attributes: ["@max(50)"]
        description: "Action type"

      # =======================================================================
      # Context
      # =======================================================================
      reference_type:
        type: string?
        attributes: ["@max(50)"]
        description: "Reference entity type (order, payment, etc.)"

      reference_id:
        type: uuid?
        attributes: ["@exclude_from_foreign_key_check"]
        description: "Reference entity ID"

      # =======================================================================
      # Delivery
      # =======================================================================
      status:
        type: NotificationStatus
        attributes: ["@default(pending)"]
        description: "Delivery status"

      scheduled_at:
        type: datetime?
        description: "Scheduled delivery time"

      sent_at:
        type: datetime?
        description: "When sent"

      delivered_at:
        type: datetime?
        description: "When delivered"

      read_at:
        type: datetime?
        description: "When read"

      failed_at:
        type: datetime?
        description: "Failure timestamp"

      failure_reason:
        type: string?
        attributes: ["@max(255)"]
        description: "Failure reason"

      retry_count:
        type: int
        attributes: ["@default(0)", "@non_negative"]
        description: "Retry attempts"

      # =======================================================================
      # External References
      # =======================================================================
      external_id:
        type: string?
        attributes: ["@max(100)", "@exclude_from_foreign_key_check"]
        description: "External message ID"

      # =======================================================================
      # Priority
      # =======================================================================
      priority:
        type: NotificationPriority
        attributes: ["@default(normal)"]
        description: "Notification priority"

      # =======================================================================
      # Interaction
      # =======================================================================
      is_actionable:
        type: bool
        attributes: ["@default(false)"]
        description: "Has action button"

      action_taken:
        type: bool
        attributes: ["@default(false)"]
        description: "User took action"

      action_taken_at:
        type: datetime?
        description: "Action timestamp"

      # =======================================================================
      # Dismissal
      # =======================================================================
      is_dismissed:
        type: bool
        attributes: ["@default(false)"]
        description: "User dismissed"

      dismissed_at:
        type: datetime?
        description: "Dismissal timestamp"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    relations:
      user:
        type: sapiens.User
        attributes: ["@one", "@foreign_key(user_id)"]
        description: "Recipient"
        inverse: notifications

    indexes:
      - type: index
        fields: [user_id, status, created_at]
      - type: index
        fields: [user_id, notification_type, created_at]
      - type: index
        fields: [status, scheduled_at]
      - type: index
        fields: [reference_type, reference_id]
