# =============================================================================
# Domain: Notification
# Entity: Notification
# Description: One rendered notification for ONE recipient of ONE domain event. Fan-out creates one row per
# recipient. **Idempotent per (event_id, recipient_address)** — a redelivered domain event does not
# re-create nor re-dispatch a recipient's notification (the inbox pattern realized on the natural
# idempotency key). Dispatched through backbone-communication; `message_id` correlates back to the
# communication message. Posts NO GL.
# =============================================================================

models:
  - name: Notification
    collection: notifications
    description: "One rendered notification for one recipient of one event (idempotent per event+recipient)"
    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique notification id"
      company_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Org owner # logical FK to organization.Company.id"
      event_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "The domain event instance that triggered this # the dedup key"
      event_type:
        type: string
        attributes: ["@required", "@length(max=80)"]
        description: "The domain event type (OrderConfirmed, …)"
      template_id:
        type: uuid?
        attributes: ["@exclude_from_foreign_key_check"]
        description: "The template rendered # logical FK to NotificationTemplate.id"
      channel:
        type: NotifChannel
        attributes: ["@required"]
        description: "The channel dispatched over"
      recipient_party_id:
        type: uuid?
        attributes: ["@exclude_from_foreign_key_check"]
        description: "The recipient party # logical FK to party.Party.id"
      recipient_address:
        type: string
        attributes: ["@required", "@length(max=200)"]
        description: "The recipient address (phone/email) — part of the idempotency key"
      subject:
        type: string?
        attributes: ["@length(max=200)"]
        description: "Rendered subject (email)"
      body:
        type: string
        attributes: ["@required", "@length(max=4000)"]
        description: "Rendered body"
      status:
        type: NotificationStatus
        attributes: ["@required", "@default(pending)"]
        description: "pending → sent | failed | skipped"
      message_id:
        type: uuid?
        attributes: ["@exclude_from_foreign_key_check"]
        description: "The dispatched communication message # logical FK to communication.Message.id"
      failure_reason:
        type: string?
        attributes: ["@length(max=300)"]
        description: "Why dispatch failed"
      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata"
    indexes:
      # The idempotency guard: one notification per (event, recipient). A redelivered domain event that
      # re-runs the fan-out conflicts here and is skipped — no double-notify.
      - type: unique
        fields: [event_id, recipient_address]
      - type: index
        fields: [company_id, status]

enums:
  - name: NotificationStatus
    description: "Notification lifecycle"
    variants:
      - name: pending
        description: "Recorded, not yet dispatched"
        default: true
      - name: sent
        description: "Handed to the channel gateway (accepted for send) — not yet confirmed delivered"
      - name: delivered
        description: "The provider confirmed delivery to the recipient (communication MessageDelivered)"
      - name: undelivered
        description: "The provider reported non-delivery after hand-off (communication MessageFailed)"
      - name: failed
        description: "The gateway REJECTED the dispatch (never handed off)"
      - name: skipped
        description: "No active template for the (event_type, channel) — nothing to send"
